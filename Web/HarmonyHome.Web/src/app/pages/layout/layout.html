<div class="layout">
  <aside class="sidebar">
    <h2>HarmonyHome</h2>

    <nav>
      <a routerLink="/productos">Productos</a>
      <a routerLink="/clientes">Clientes</a>
      <a routerLink="/venta">Venta</a>
      <a routerLink="/pedidos">Pedidos</a>
      <a routerLink="/reposiciones">Reposiciones</a>
    </nav>

    <div class="user-box" *ngIf="user">
      <p>{{ user.userName }}</p>
      <span>{{ user.role }}</span>
      <button type="button" (click)="logout()">Cerrar sesión</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
